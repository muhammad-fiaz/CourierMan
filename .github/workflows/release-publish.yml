name: Release Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: CourierMan-windows
          - os: macos-latest
            artifact: CourierMan-macos
          - os: ubuntu-latest
            artifact: CourierMan-linux

    steps:
      - uses: actions/checkout@v5
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Update xrepo repositories
        run: xrepo update-repo
      - name: Install aqtinstall from git (Qt 6.11.x fix)
        if: runner.os != 'Linux'
        run: pip install "aqtinstall @ git+https://github.com/miurahr/aqtinstall.git"
      - uses: jurplel/install-qt-action@v4
        if: runner.os != 'Linux'
        with:
          version: "6.11.1"
          modules: "qt5compat"
      - name: Install Linux Qt
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev
      - name: Configure Qt-backed platforms
        if: runner.os != 'Linux'
        run: xmake f -m release --qt=${{ env.QT_ROOT_DIR }} -y
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: xmake f -m release -y
      - name: Build
        run: xmake -y
      - name: Run App
        if: runner.os == 'Linux'
        env:
          COURIERMAN_SMOKE_TEST: "1"
          QT_QPA_PLATFORM: offscreen
        run: xmake run CourierMan
      - name: Run App
        if: runner.os != 'Linux'
        env:
          COURIERMAN_SMOKE_TEST: "1"
        run: xmake run CourierMan
      - name: Package
        run: xmake package -y
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            build/**
            dist/**

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          generate_release_notes: true
          files: release-artifacts/**
