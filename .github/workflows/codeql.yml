name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "33 3 * * 1"

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev
      - name: Configure
        run: cmake -S . -B build/codeql -G Ninja -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build/codeql
      - uses: github/codeql-action/analyze@v3
