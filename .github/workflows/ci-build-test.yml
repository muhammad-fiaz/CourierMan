name: CI Build And Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  xmake:
    name: xmake ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x64
          - os: windows-latest
            arch: arm64
          - os: macos-latest
            arch: x86_64
          - os: macos-latest
            arch: arm64
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: aarch64

    steps:
      - uses: actions/checkout@v5
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
      - uses: xmake-io/github-action-setup-xmake@v1
      - name: Update xrepo repositories
        run: xrepo update-repo
      - uses: jurplel/install-qt-action@v4
        if: runner.os != 'Linux'
        with:
          version: "6.10.3"
          modules: "qt5compat"
      - name: Install Linux Qt
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-dev-tools libgl1-mesa-dev
      - name: Configure Qt-backed platforms
        if: runner.os != 'Linux'
        run: xmake f -m debug --arch=${{ matrix.arch }} --qt=${{ env.QT_ROOT_DIR }} -y
      - name: Configure Linux
        if: runner.os == 'Linux'
        run: xmake f -m debug --arch=${{ matrix.arch }} -y
      - name: Build
        run: xmake -y
      - name: Run App
        if: runner.os == 'Linux'
        env:
          COURIERMAN_SMOKE_TEST: "1"
          QT_QPA_PLATFORM: offscreen
        run: xmake run CourierMan
      - name: Run App
        if: runner.os != 'Linux'
        env:
          COURIERMAN_SMOKE_TEST: "1"
        run: xmake run CourierMan
      - name: Test
        run: xmake run courierman_tests
