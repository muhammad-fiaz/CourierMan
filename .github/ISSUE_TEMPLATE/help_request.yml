name: Help request
description: Ask for help using or building CourierMan.
title: "[Help]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
      description: What do you need help with?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include OS, build command, logs, and screenshots when relevant.
